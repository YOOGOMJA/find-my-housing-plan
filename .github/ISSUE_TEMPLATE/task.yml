name: 작업 요청
description: 기능/개선/정리 작업을 정의합니다.
title: "[작업] "
labels: ["task"]
body:
  - type: textarea
    id: goal
    attributes:
      label: 작업 목표
      description: 이번 작업으로 달성할 목표를 한국어로 작성해주세요.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: 작업 범위
      description: 포함/제외 범위를 구분해서 적어주세요.
      placeholder: |
        포함:
        - ...

        제외:
        - ...
    validations:
      required: true

  - type: textarea
    id: plan
    attributes:
      label: 실행 계획
      description: 구현 순서 또는 체크리스트를 작성해주세요.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: done
    attributes:
      label: 완료 조건 (Definition of Done)
    validations:
      required: true
